<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Contact Me</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .me {
            font-size: 20px;
            font-weight: bolder;
            font-family: "Playwrite AU QLD", cursive;

        }

        nav ul {
            display: flex;
            gap: 17px;
            align-items: center;
        }

        nav ul li {
            list-style-type: none;
            font-size: 16px;
            font-family: "Cormorant Garamond", serif;
            color:white;

        }

        nav {
            display: flex;
            justify-content: space-around;
            /* background-color:blueviolet; */
            background-image: linear-gradient(to right, rgb(28, 3, 32), rgb(126, 15, 125));
            color:white;
            padding: 10px 0;
        }

        .contact {
            padding: 52px 10%;
            text-align: center;
        }

        .contact h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .contact p {
            margin-bottom: 30px;
            color: #555;
        }

        .contact-container {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            flex-wrap: wrap;
        }

        .contact-info {
            flex: 1;
            min-width: 250px;
            text-align: left;
        }

        .contact-info h2 {
            margin-bottom: 15px;
        }

        .contact-info p {
            margin: 10px 0;
        }

        .contact-form {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 12px;
            border: 1px solid #912a2a;
            border-radius: 8px;
            outline: none;
            background-color: rgb(244, 185, 244);
        }

        .contact-form button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-image: linear-gradient(to right, rgb(62, 6, 71), rgb(126, 15, 125));
            color:white;
            cursor: pointer;
            font-size: 16px;
        }

        .contact-form button:hover {
            opacity: 0.9;
        }

        .contact {
            background-image: url("https://img.magnific.com/free-vector/gradient-smooth-background_23-2148969006.jpg?semt=ais_hybrid&w=740&q=80");
               background-repeat: no-repeat;
               background-size:100%;
        }
        p{
            font-size:20px;
            font-weight: 600;
             
        }
        .back-btn a{
    text-decoration: none;
    color:white;
    font-size: 16px;
    font-weight: bold;
    padding: 6px 12px;
    border: 2px solid white;
    border-radius: 8px;
    transition: 0.3s;
    text-align: center;
}
.back-btn a:hover{
    background-color:white;
    color: rgb(230, 33, 148);
}
     
    </style>

</head>

<body>
    <nav>
        <div class="back-btn"  >
        <a href="index.html">←back</a>
    </div>
        <div class="me">
            Contact Me
        </div>
        <ul>
            <li>Vishesh's Portfolio</li>
        </ul>
    </nav>
    <section class="contact">
        <h1>Get In Touch</h1>
        <p style="color:black;">
            Have a project in mind or want to collaborate? Feel free to contact me.
        </p>

        <div class="contact-container">
            <div class="contact-info">
              <h2>Contact Information</h2>
                <p style="color:black;">📧 Email: visheshsaini743@gmail.com</p>
                <p style="color:black;">📱 Phone: +91 8266879880</p>
                <p style="color:black;">📍 Roorkee, Uttarakhand</p>
            </div>

            <form class="contact-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="text" placeholder="Subject">
                <textarea rows="5" placeholder="Your Message"></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </section>
     
</body>

</html>
